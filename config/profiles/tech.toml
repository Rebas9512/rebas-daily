# 科技板块兴趣画像（2026-07-04 板块拆分时新建）
# 源：AI 公司官方博客、研究机构博客、独立技术博客、日更 newsletter、HN、TechCrunch。
# 学术板块只留论文，模型发布/产品/产业动态类内容归这里。时效：最新（无沉淀期）。

[board]
