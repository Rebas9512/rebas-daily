# 艺术板块兴趣画像（初稿 2026-07-03；2026-07-05 设计三领域拆至 design 板块）
# 现定位：当代艺术/艺术市场、建筑/空间、视觉文化。
# 产品/工业/平面设计的兴趣项已随拆分移入 profiles/design.toml——
# 此处不再保留对应关键词，避免 Dezeen 等综合源的设计类条目在两个板块重复成题。

[board]
id = "art"
name = "艺术 · 当代艺术/建筑"

[[interest]]
name = "当代艺术 / 艺术市场"
weight = 5
keywords = ["exhibition", "auction", "biennale", "contemporary art", "museum"]

[[interest]]
name = "建筑 / 空间"
weight = 5
keywords = ["architecture", "interior", "urban design", "pavilion"]

[[interest]]
name = "时尚产业"
weight = 2
keywords = ["fashion", "runway", "brand collaboration"]

[low_priority]
keywords = []

[blocklist]
keywords = []

[reader]
# 切入角度=背景故事：不是解释技术术语，而是给作品/人物/事件的来历和纵深
assumed = "懂技术、对设计与艺术有兴趣，但不是艺术/设计圈内人"
explain = "切入角度是背景故事：作品与设计师/机构/流派的来历与地位（一件拍品的出土与流传、一位设计师的成名之路、一个奖项或双年展的分量）、行业事件的前情——让报道有故事的纵深；圈内说法（策展、中古、联名这类）视陌生度给一句白话"
