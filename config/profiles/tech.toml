[reader]
# 2026-07-05 读者重定位：科技新闻读者，非从业者
assumed = "关注 AI 与科技新闻的聪明读者：认识主流公司和产品名，但不写代码、不在行业内"
explain = "AI 技术概念首次出现顺手白话解释（模型、agent、推理、训练、开源权重这些行话读者不一定懂）；产业与生态语境要一句定位（公司/产品在生态里的位置、商业模式与政策监管背景）；开发工具链专名首次出现给一句白话；公司/人物的前情故事（此前的产品线、争议、竞争格局）也算背景"
