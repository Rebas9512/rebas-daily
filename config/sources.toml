[[source]]
id = "arxiv-ai-combined"
board = "academic"
name = "arXiv (cs.AI+cs.LG+cs.CL+cs.CV+stat.ML)"
type = "arxiv_rss"
endpoint = "https://rss.arxiv.org/rss/cs.AI+cs.LG+cs.CL+cs.CV+stat.ML"
