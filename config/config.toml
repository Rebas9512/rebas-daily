# rebas_daily 全局配置

[general]
# 2026-07-04 cron 设计定稿：刊物日历以达拉斯为准（issue_date 与发布闸门都按此）
timezone = "America/Chicago"
data_dir = "data"            # SQLite 与图片缓存（相对项目根）
site_dir = "site"            # 静态站渲染输出

[llm]
backend = "codex_cli"        # codex_cli | openai_api（抽象层随时可切）
codex_home = ".codex"        # 项目专用凭证目录（相对项目根）
call_gap_seconds = 2.0       # 相邻调用间隔（订阅额度节流）
timeout_seconds = 300
# 允许联网搜索的角色（codex exec -c tools.web_search=true；2026-07-06 本机 0.142.5 实测可用）。
# 背调靠它调查薄材料新闻选题的事实细节；搜索调用耗时更长，超时自动放宽到 2 倍。
# 注意：此键必须在 [llm.roles] 表头之前（TOML 表作用域）
search_roles = ["researcher", "classic"]   # classic = 经典鉴赏栏目策展（提名要联网核实作品与找图）

[llm.roles]                  # 各 agent 角色 → 模型档位（2026-07-03 实测可用型号）
default = "gpt-5.5"
screen = "gpt-5.4-mini"      # 大批量粗筛用 mini 档省额度
editor = "gpt-5.5"
checker = "gpt-5.5"
researcher = "gpt-5.5"       # 背景调查：教科书级概念解释，讲错比不讲更糟 → 主力档
writer = "gpt-5.5"
classic = "gpt-5.5"          # 经典鉴赏栏目策展：从自身艺术史知识提名+联网核实

[publish]
# 2026-07-04 板块拆分：学术只做论文（沉淀 48h 等 OpenAlex），其余板块做最新消息
# 2026-07-04 加量化板块（论文+新闻混合：q-fin 论文自动沉淀，新闻最新）
# 2026-07-05 加设计板块（产品/工业/平面，自 art 拆出）
boards = ["academic", "repos", "tech", "data", "finance", "quant", "design", "art"]
window_hours = 96            # 取窗下限：published_at 距今不超过 N 小时（无发布时间的按 fetched_at 36h）
paper_settle_hours = 48      # 论文沉淀期：kind=paper 发布满 N 小时才入刊
                             # 实测（2026-07-04）：OpenAlex 收录 arXiv ~26h 龄 0%、~50h 龄 100%；
                             # 沉淀 48h 换全量作者信号 + 两天社区热度。设 0 恢复当天出刊。
screen_batch = 50            # 粗筛每批条数
screen_min_score = 3         # 低于此分 → dropped（题录保留）
screen_cap = 400             # 单期粗筛输入上限
editor_top = 80              # 主编看粗筛分前 N 条
feature_cap = 4              # 每板块 feature 硬上限（代码兜底）
brief_length = 300           # 速览报道目标篇幅（字）——每条入选速览也出短报道页
site_keep_days = 7           # 往期完整页面保留天数（相对最新一期）；更早的进归档只存目
                             # 渲染期生效，数据库不动——调大后 rebas render 可整体找回
paper_fulltext_max_chars = 40000   # 专题级论文选题抓原文精读的截断上限（字符）；0 = 关闭。
                                   # 原文缓存在 data/paper_cache/，writer 写完即删，DB 只留摘要
paper_deepread_length = 1800       # 精读专题目标篇幅下限（字）：有原文时 target 取 max(主编值, 此值)；0=不放宽
paper_brief_fulltext_max_chars = 12000  # 论文类速览（brief）抓原文精读的截断上限（字符）；0 = 速览不精读回旧行为。
                                        # 比专题上限小：速览只需方法要点+关键结果，够抓到就好又省额度；
                                        # 缓存与专题共用（按较大上限抓一次），撰写速览时再裁到此上限
refill_min_topics = 6              # 补充轮（publish --refill，收尾批用）：板块已有选题少于此数
                                   # 且白天有新候选时，主编补选不重复的新选题；0=关闭补充轮
research_facts_max = 6             # 调查补充（2026-07-06 新闻/repo，07-07 扩展论文）：材料薄的选题
                                   # 背调 agent 联网检索补充事实细节的每题条数上限；0=关闭。
                                   # 产物经背景审核（新闻门槛放宽）后以"据 X 报道"口径进撰写
image_review_boards = ["art", "design"]  # 撰写期图片审选（2026-07-07）：这些板块的候选图下载后
                                         # 附给 writer（codex -i 多模态）实际查看——决定留哪些图
                                         # （可全弃降级无图版式）、正文何处插图；[]=关闭回旧行为
classic_board = "art"              # 经典鉴赏栏目（2026-07-07）：该板块每天固定一个经典作品
                                   # 鉴赏专题——主编（classic 角色，联网）提名，周一至五=油画、
                                   # 周末=自由门类；图片闸门=拿不到可用图就换选题（最多 3 次）。
                                   # ""=关闭栏目
# 出刊时间点待定（M5 接 cron 时确定）
